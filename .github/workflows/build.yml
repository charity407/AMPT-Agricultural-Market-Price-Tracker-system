name: Build and Test

on:
  push:
    branches: [ master, feature/** ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: agriprice_db
          POSTGRES_USER: agriprice_user
          POSTGRES_PASSWORD: agriprice_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify WAR file created
        run: |
          ls -lh target/*.war
          echo "Build successful"

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: agri-price-tracker-war
          path: target/agri-price-tracker.war
          retention-days: 7
