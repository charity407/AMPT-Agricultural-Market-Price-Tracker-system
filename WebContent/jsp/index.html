<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMPT Market Tracker</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 500px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        select { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 20px; }
        h2 { color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <h2>AMPT Price Tracker</h2>
        
        <label for="countySelect"><b>Region: Select County</b></label>
        <select id="countySelect">
            <option value="">Loading Counties from Neon...</option>
        </select>

        <label for="productSelect"><b>Commodity: Select Product</b></label>
        <select id="productSelect">
            <option value="">Loading Products...</option>
        </select>

        <div id="status">Connecting to Java Backend...</div>
    </div>

    <script>
        async function populateDropdown(endpoint, elementId) {
            try {
                // This calls your Java DropdownHelper.java
                const response = await fetch(`http://localhost:8080/api/dropdowns/${endpoint}`);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                const select = document.getElementById(elementId);
                
                select.innerHTML = '<option value="">-- Select Option --</option>';
                data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.id;
                    opt.textContent = item.label;
                    select.appendChild(opt);
                });
                document.getElementById('status').innerText = "✅ Data Loaded from Neon Cloud";
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').innerText = "❌ Connection Error. Is Java Server running?";
            }
        }

        // Initialize dropdowns
        populateDropdown('counties', 'countySelect');
        populateDropdown('products', 'productSelect');
    </script>
</body>
</html>
